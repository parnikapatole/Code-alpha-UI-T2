<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Assistant | Professional Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Very Light Coffee Shade */
            --light-coffee: #EADDCD; 
            --pure-black: #000000;
            --bg-canvas: #f2ebe1; 
            --text-dark: #1a1a1a;
            --bot-bubble: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            height: 100vh;
            background: var(--bg-canvas);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-container {
            width: 100%;
            max-width: 420px;
            height: 90vh;
            background: var(--light-coffee);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            border: 8px solid var(--pure-black);
            overflow: hidden;
        }

        /* Fixed Header */
        .header {
            padding: 20px 24px;
            background: var(--pure-black);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand-group { display: flex; align-items: center; gap: 12px; }
        .bot-icon {
            width: 38px; height: 38px;
            background: var(--light-coffee);
            color: var(--pure-black);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .brand-name { color: var(--light-coffee); font-weight: 600; font-size: 1.1rem; }

        /* Functional Dropdown Menu */
        .menu-wrapper { position: relative; }
        .dots-btn { background: none; border: none; color: var(--light-coffee); font-size: 1.3rem; cursor: pointer; padding: 5px; }
        .dropdown-menu {
            position: absolute; right: 0; top: 40px;
            background: var(--pure-black); border: 1px solid var(--light-coffee);
            border-radius: 12px; width: 160px;
            display: none; flex-direction: column; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .dropdown-menu.show { display: flex; }
        .dropdown-menu button {
            padding: 12px 16px; border: none; background: none; color: var(--light-coffee);
            text-align: left; font-size: 0.85rem; cursor: pointer; border-bottom: 1px solid #333;
        }
        .dropdown-menu button:hover { background: #222; }

        /* Chat Flow */
        .chat-view {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
        }

        .msg { display: flex; max-width: 85%; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { align-self: flex-end; }
        .msg.bot { align-self: flex-start; }

        .bubble { padding: 12px 16px; border-radius: 20px; font-size: 0.9rem; line-height: 1.5; }
        .user .bubble { background: var(--pure-black); color: var(--light-coffee); border-bottom-right-radius: 4px; }
        .bot .bubble { background: var(--bot-bubble); color: var(--pure-black); border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* 2-Line Question Grid */
        .grid-questions {
            padding: 15px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .q-btn {
            background: var(--pure-black);
            color: var(--light-coffee);
            border: 1px solid var(--light-coffee);
            padding: 12px 10px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .q-btn:hover { background: #1a1a1a; transform: translateY(-2px); }

        /* Input Area */
        .footer { padding: 0 20px 30px; }
        .input-pill {
            background: var(--pure-black);
            border-radius: 30px;
            padding: 8px 8px 8px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .paperclip { color: var(--light-coffee); cursor: pointer; font-size: 1.1rem; border: none; background: none; }
        
        input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--light-coffee); font-size: 0.95rem;
        }
        input::placeholder { color: rgba(234, 221, 205, 0.4); }

        .send-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--light-coffee); color: var(--pure-black);
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
            font-size: 1.1rem;
        }
        .send-btn:hover { transform: scale(1.1) rotate(-10deg); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="phone-container">
        <header class="header">
            <div class="brand-group">
                <div class="bot-icon"><i class="fa-solid fa-robot"></i></div>
                <div class="brand-name">Nova Assistant</div>
            </div>
            
            <div class="menu-wrapper">
                <button class="dots-btn" id="menuToggle">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <button onclick="clearChat()">Clear History</button>
                    <button onclick="alert('Exporting PDF...')">Export PDF</button>
                    <button onclick="location.reload()">Restart System</button>
                </div>
            </div>
        </header>

        <main class="chat-view" id="chatArea">
            <div class="msg bot">
                <div class="bubble">System active. How can I assist you with your data today?</div>
            </div>
        </main>

        <div class="grid-questions">
            <div class="q-btn" onclick="ask('Whats todays weather')">Whats todays weather</div>
            <div class="q-btn" onclick="ask('Todays time And date')">Todays time And date</div>
            <div class="q-btn" onclick="ask('Running status')">Running status</div>
            <div class="q-btn" onclick="ask('How it works')">How it works</div>
        </div>

        <footer class="footer">
            <div class="input-pill">
                <button class="paperclip" onclick="document.getElementById('fileIn').click()">
                    <i class="fa-solid fa-paperclip"></i>
                </button>
                <input type="file" id="fileIn" style="display:none" onchange="handleFile(this)">
                
                <input type="text" id="userInput" placeholder="Ask Nova...">
                
                <button class="send-btn" onclick="handleSend()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </div>

    <script>
        // Menu Toggle Logic
        const menuToggle = document.getElementById('menuToggle');
        const dropdownMenu = document.getElementById('dropdownMenu');

        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            dropdownMenu.classList.remove('show');
        });

        // Chat Logic
        function handleSend(customText) {
            const input = document.getElementById('userInput');
            const text = customText || input.value.trim();
            if(!text) return;

            addMsg('user', text);
            input.value = "";

            setTimeout(() => {
                addMsg('bot', getLogic(text));
            }, 600);
        }

        function getLogic(query) {
            const q = query.toLowerCase();
            const now = new Date();
            if(q.includes('weather')) return "It's 24°C in Mumbai. Clear skies.";
            if(q.includes('time')) return "Today is " + now.toLocaleDateString() + " | Time: " + now.toLocaleTimeString();
            if(q.includes('status')) return "Nova Engine: 100% Operational.";
            if(q.includes('works')) return "I process technical data using a neural-mapped logic framework.";
            return "Command processed by Nova Assistant.";
        }

        function addMsg(sender, text) {
            const chat = document.getElementById('chatArea');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}`;
            msgDiv.innerHTML = `<div class="bubble">${text}</div>`;
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        function ask(val) { handleSend(val); }

        function clearChat() {
            document.getElementById('chatArea').innerHTML = '<div class="msg bot"><div class="bubble">History cleared.</div></div>';
        }

        function handleFile(input) {
            if(input.files && input.files[0]) {
                addMsg('user', "File: " + input.files[0].name);
                setTimeout(() => addMsg('bot', "File received. Analysis complete."), 800);
            }
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
